# ---------------------------------------------------------------------------
# Stage 1: parse_corpus
# ---------------------------------------------------------------------------
parse_corpus:
  corpus_root: data/raw/ru-fr_interference
  metadata: data/raw/ru-fr_interference/metadata_RUFR.csv
  rufrcorr: data/raw/ru-fr_interference/RUFRcorr.csv
  output: data/interim/tokens.csv

  debug:
    enable: false
    n_speakers: 4
    n_repetitions: 1

# ---------------------------------------------------------------------------
# Stage 2: extract_acoustics
# ---------------------------------------------------------------------------
extract_acoustics:
  input_tokens: data/interim/tokens.csv
  output_features: data/interim/features_acoustic.csv

  corpus_root: data/raw/ru-fr_interference
  wav_subdir: wav_et_textgrids/FRcorp_textgrids_only

  formants:
    n_formants: 5
    max_formant_female: 5000
    max_formant_male: 4500
    long_vowel_threshold_s: 0.080

  pitch:
    floor_hz: 50
    ceiling_hz: 600

  scg:
    fricatives: ["f", "v", "s", "z", "ʃ", "ʒ", "ʁ"]

  debug:
    enable: false
    n_tokens: 200

# ---------------------------------------------------------------------------
# Stage 3: extract_neural_whisper
# ---------------------------------------------------------------------------
extract_neural_whisper:
  input_tokens: data/interim/tokens.csv
  input_features_acoustic: data/interim/features_acoustic.csv

  model_name: "openai/whisper-medium"
  layers: [ 4, 12, 20]

  device: "auto"             # "auto" -> cuda if available else cpu; or "cuda" / "cpu"
  embedding_dtype: "float16" # storage dtype for npz

  output_dir: data/interim
  output_prefix: features_whisper

  debug:
    enable: false
    n_tokens: 3

# ---------------------------------------------------------------------------
# Stage 4: extract_neural_xlsr
# ---------------------------------------------------------------------------
extract_neural_xlsr:
  input_tokens: data/interim/tokens.csv
  input_features_acoustic: data/interim/features_acoustic.csv

  model_name: "facebook/wav2vec2-large-xlsr-53"
  layers: [4, 12, 20]

  device: "auto"             # "auto" -> cuda if available else cpu; or "cuda" / "cpu"
  embedding_dtype: "float16" # storage dtype for npz

  output_dir: data/interim
  output_prefix: features_xlsr

  debug:
    enable: false
    n_tokens: 3

# ---------------------------------------------------------------------------
# Stage 5a: normalise_acoustic
# ---------------------------------------------------------------------------
normalise_acoustic:
  input_features: data/interim/features_acoustic.csv
  input_tokens: data/interim/tokens.csv
  output_features: data/interim/features_acoustic_norm.csv

  # French oral + nasal vowel inventory, on phoneme_base (NFD-stripped).
  # Used to (a) fit the per-speaker Lobanov mean/std, (b) decide which tokens
  # receive *_norm values (consonants stay NaN).
  vowel_inventory:
    # French oral vowels
    - "i"
    - "e"
    - "ɛ"
    - "a"
    - "ɑ"
    - "ɔ"
    - "o"
    - "u"
    - "y"
    - "ø"
    - "œ"
    - "ə"

    # French nasal vowels
    - "ɛ̃"
    - "ɑ̃"
    - "ɔ̃"
    - "œ̃"

    # L2 / Russian interference vowels observed in the corpus
    - "ɨ"
    - "ɪ"
    - "ʉ"
    - "æ"

  min_vowel_tokens_per_speaker: 10  # paranoia threshold; abort if a speaker is below
  f0_reference_hz: 100.0            # reference for log-Hz -> semitone conversion

# ---------------------------------------------------------------------------
# Stage 5b: normalise_neural
# ---------------------------------------------------------------------------
# Layers and prefixes are NOT duplicated here: we read them from the upstream
# extract_neural_{whisper,xlsr} blocks. One PCA per (model, layer) pair.
normalise_neural:
  input_dir: data/interim
  output_dir: data/interim
  pca_output_suffix: pca       # -> features_<prefix>_L{NN}_pca.npz
  umap_output_suffix: umap     # -> features_<prefix>_L{NN}_umap.npz

  pca_n_components: 50

  umap_n_components: 2
  umap_n_neighbors: 15         # default; phoneme clusters are local structure
  umap_min_dist: 0.1           # default; tighter clusters than 0.5

  random_state: 42

# ---------------------------------------------------------------------------
# Stage 6a: descriptive_acoustic
# ---------------------------------------------------------------------------
descriptive_acoustic:
  input_features: data/interim/features_acoustic_norm.csv
  figures_dir: results/figures
  tables_dir: results/tables
  random_state: 42

  # PDF-compliant selected subset for the intra-speaker variability figure.
  # The full table is still written to results/tables/tab_intraspeaker_variability_sd.csv.
  intraspeaker_subset_vowels: ["i", "e", "a", "ɑ", "y", "ə"]

# ---------------------------------------------------------------------------
# Stage 6b: descriptive_neural
# ---------------------------------------------------------------------------
descriptive_neural:
  input_metadata: data/interim/features_acoustic_norm.csv  # for token_id -> phoneme/L1/gender
  interim_dir: data/interim
  figures_dir: results/figures
  tables_dir: results/tables

  n_within_per_class: 500
  n_between_pairs: 5000
  random_state: 42

  # Efficient plotting policy: compute tables for all layers, but only generate
  # report-ready figures for selected layers unless plot_all_layers is true.
  plot_all_layers: false
  report_layers:
    whisper: [12]
    xlsr: [4]

  # Required by the PDF: one projection coloured by phoneme, one by L1 status,
  # and one by gender. All plots remain vowel-only to answer the vowel-structure question.
  color_by: ["phoneme_base", "L1_status", "gender"]

# ---------------------------------------------------------------------------
# Stage 6c: descriptive_cross
# ---------------------------------------------------------------------------
descriptive_cross:
  input_acoustic: data/interim/features_acoustic_norm.csv
  interim_dir: data/interim
  figures_dir: results/figures
  tables_dir: results/tables

  # Main analysis: PDF core vowel-space representation.
  acoustic_main_feature_cols: ["F1_norm", "F2_norm"]

  # Optional extended acoustic representation. Kept separate because adding
  # F3/f0 changes the acoustic geometry used by the Mantel comparison.
  acoustic_extended_feature_cols: ["F1_norm", "F2_norm", "F3_norm", "f0_st"]

  # Mantel table is computed for all layers. RSM heatmaps are plotted only for
  # selected layers to keep the output directory clean.
  rsm_plot_layers:
    whisper: [12]
    xlsr: [4, 12]

  mantel_n_permutations: 5000
  random_state: 42

# ---------------------------------------------------------------------------
# Stage 7: statistical_tests
# ---------------------------------------------------------------------------
statistical_tests:
  input_acoustic: data/interim/features_acoustic_norm.csv
  interim_dir: data/interim
  figures_dir: results/figures
  tables_dir: results/tables

  # Core French oral vowels used for the PDF Section 6 vowel analyses.
  oral_vowels: ["i", "e", "ɛ", "a", "ɑ", "ɔ", "o", "u", "y", "ø", "œ", "ə"]

  # Acoustic representation for vowel-space tests and distance matrices.
  acoustic_feature_cols: ["F1_norm", "F2_norm"]

  # Neural analyses use raw 1024-d embeddings, not PCA/UMAP.
  # Tables are computed for all listed layers.
  neural_layers:
    whisper: [4, 12, 20]
    xlsr: [4, 12, 20]

  # Only these confusion matrices are plotted to keep the output directory clean.
  classification_plot_layers:
    whisper: [4]
    xlsr: [4]

  # PDF Section 6 parameters.
  alpha: 0.05
  neural_l1_l2_n_permutations: 5000
  mantel_n_permutations: 5000
  bootstrap_n_resamples: 2000

  # PDF examples, adapted to actual IPA labels in phoneme_base.
  bootstrap_pairs:
    - ["e", "ɛ"]
    - ["o", "ɔ"]
    - ["y", "u"]

  min_speakers_per_group: 2
  random_state: 42

# ---------------------------------------------------------------------------
# Stage 8: lme_models
# ---------------------------------------------------------------------------
lme_models:
  input_acoustic: data/interim/features_acoustic_norm.csv
  interim_dir: data/interim
  figures_dir: results/figures
  tables_dir: results/tables

  # Same selection logic as statistical_tests; runtime filter keeps only
  # phonemes with >= 5 complete F1/F2 tokens.
  oral_vowels: ["i", "e", "ɛ", "a", "ɑ", "ɔ", "o", "u", "y", "ø", "œ", "ə"]

  # PDF Section 7.1 acoustic responses.
  acoustic_response_cols: ["F1_norm", "F2_norm"]

  # Neural layers reused from statistical_tests / extract_neural_*.
  neural_layers:
    whisper: [4, 12, 20]
    xlsr: [4, 12, 20]

  # PDF Section 7.2: project to first d = 5 PCs.
  neural_pca_n_components: 5

  # Vowel-height fixed effect (PDF Section 7.3 step 4). IPA-driven mapping.
  vowel_height:
    i: high
    y: high
    u: high
    e: mid
    ø: mid
    o: mid
    ɛ: mid
    œ: mid
    ɔ: mid
    ə: mid
    a: low
    ɑ: low

  # PDF Question 8: ICC of /a/ in acoustic F1 vs neural PC1.
  icc_phoneme: "a"
  icc_neural_rep:
    model: whisper
    layer: 12
    pc: 1

  alpha: 0.05
  random_state: 42

# ---------------------------------------------------------------------------
# Stage 9: rope_ci
# ---------------------------------------------------------------------------
rope_ci:
  input_acoustic: data/interim/features_acoustic_norm.csv
  input_features_acoustic_raw: data/interim/features_acoustic.csv
  interim_dir: data/interim
  figures_dir: results/figures
  tables_dir: results/tables

  # Same vowel selection logic as Stage 8.
  oral_vowels: ["i", "e", "ɛ", "a", "ɑ", "ɔ", "o", "u", "y", "ø", "œ", "ə"]
  acoustic_response_cols: ["F1_norm", "F2_norm"]

  # All layers used for full CI + ROPE tables.
  neural_layers:
    whisper: [4, 12, 20]
    xlsr: [4, 12, 20]

  # Layers used for the main report forest plot.
  # Justified by Stage 5/6 descriptive results: Whisper L12 has the highest
  # between-class UMAP ratio and partial R^2(L2) among Whisper layers; XLS-R L04
  # has the highest between-class ratio, within/between cosine ratio, Mantel r
  # with the acoustic distance, and partial R^2(L2) among XLS-R layers.
  representative_layers:
    whisper: 12
    xlsr: 4

  # Same mapping as Stage 8.
  vowel_height:
    i: high
    y: high
    u: high
    e: mid
    ø: mid
    o: mid
    ɛ: mid
    œ: mid
    ɔ: mid
    ə: mid
    a: low
    ɑ: low

  # PDF Section 8: bootstrap parameters.
  bootstrap_n_resamples: 2000
  alpha: 0.05

  # Acoustic ROPE per PDF Section 8.3.1.
  # F1: PDF default [-20, +20] Hz, justified by JND ~3-5% of typical F1 (~800 Hz).
  # F2: [-40, +40] Hz, scaled proportionally to typical F2 (~1500 Hz),
  #     keeping the same ~2.5-3% JND ratio as the F1 ROPE.
  rope_acoustic_hz:
    F1_norm: [-20.0, 20.0]
    F2_norm: [-40.0, 40.0]

  random_state: 42