# ---------------------------------------------------------------------------
# Stage 1: parse_corpus
# ---------------------------------------------------------------------------
parse_corpus:
  corpus_root: data/raw/ru-fr_interference
  metadata: data/raw/ru-fr_interference/metadata_RUFR.csv
  rufrcorr: data/raw/ru-fr_interference/RUFRcorr.csv
  output: data/interim/tokens.csv

  debug:
    enable: false
    n_speakers: 4
    n_repetitions: 1

# ---------------------------------------------------------------------------
# Stage 2: extract_acoustics
# ---------------------------------------------------------------------------
extract_acoustics:
  input_tokens: data/interim/tokens.csv
  output_features: data/interim/features_acoustic.csv

  corpus_root: data/raw/ru-fr_interference
  wav_subdir: wav_et_textgrids/FRcorp_textgrids_only

  formants:
    n_formants: 5
    max_formant_female: 5000
    max_formant_male: 4500
    long_vowel_threshold_s: 0.080

  pitch:
    floor_hz: 50
    ceiling_hz: 600

  scg:
    fricatives: ["f", "v", "s", "z", "ʃ", "ʒ", "ʁ"]

  debug:
    enable: false
    n_tokens: 200

# ---------------------------------------------------------------------------
# Stage 3: extract_neural_whisper
# ---------------------------------------------------------------------------
extract_neural_whisper:
  input_tokens: data/interim/tokens.csv
  input_features_acoustic: data/interim/features_acoustic.csv

  model_name: "openai/whisper-medium"
  layers: [ 4, 12, 20]

  device: "auto"             # "auto" -> cuda if available else cpu; or "cuda" / "cpu"
  embedding_dtype: "float16" # storage dtype for npz

  output_dir: data/interim
  output_prefix: features_whisper

  debug:
    enable: false
    n_tokens: 3

# ---------------------------------------------------------------------------
# Stage 4: extract_neural_xlsr
# ---------------------------------------------------------------------------
extract_neural_xlsr:
  input_tokens: data/interim/tokens.csv
  input_features_acoustic: data/interim/features_acoustic.csv

  model_name: "facebook/wav2vec2-large-xlsr-53"
  layers: [4, 12, 20]

  device: "auto"             # "auto" -> cuda if available else cpu; or "cuda" / "cpu"
  embedding_dtype: "float16" # storage dtype for npz

  output_dir: data/interim
  output_prefix: features_xlsr

  debug:
    enable: false
    n_tokens: 3

# ---------------------------------------------------------------------------
# Stage 5a: normalise_acoustic
# ---------------------------------------------------------------------------
normalise_acoustic:
  input_features: data/interim/features_acoustic.csv
  input_tokens: data/interim/tokens.csv
  output_features: data/interim/features_acoustic_norm.csv

  # French oral + nasal vowel inventory, on phoneme_base (NFD-stripped).
  # Used to (a) fit the per-speaker Lobanov mean/std, (b) decide which tokens
  # receive *_norm values (consonants stay NaN).
  vowel_inventory:
    # French oral vowels
    - "i"
    - "e"
    - "ɛ"
    - "a"
    - "ɑ"
    - "ɔ"
    - "o"
    - "u"
    - "y"
    - "ø"
    - "œ"
    - "ə"

    # French nasal vowels
    - "ɛ̃"
    - "ɑ̃"
    - "ɔ̃"
    - "œ̃"

    # L2 / Russian interference vowels observed in the corpus
    - "ɨ"
    - "ɪ"
    - "ʉ"
    - "æ"

  min_vowel_tokens_per_speaker: 10  # paranoia threshold; abort if a speaker is below
  f0_reference_hz: 100.0            # reference for log-Hz -> semitone conversion

# ---------------------------------------------------------------------------
# Stage 5b: normalise_neural
# ---------------------------------------------------------------------------
# Layers and prefixes are NOT duplicated here: we read them from the upstream
# extract_neural_{whisper,xlsr} blocks. One PCA per (model, layer) pair.
normalise_neural:
  input_dir: data/interim
  output_dir: data/interim
  pca_output_suffix: pca       # -> features_<prefix>_L{NN}_pca.npz
  umap_output_suffix: umap     # -> features_<prefix>_L{NN}_umap.npz

  pca_n_components: 50

  umap_n_components: 2
  umap_n_neighbors: 15         # default; phoneme clusters are local structure
  umap_min_dist: 0.1           # default; tighter clusters than 0.5

  random_state: 42